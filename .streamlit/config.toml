[theme]
base = "light"
primaryColor = "#2E7D32"
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#F1F5F2"
textColor = "#1B2A1F"
font = "sans serif"

[server]
headless = false
runOnSave = true
port = 8501

[browser]
gatherUsageStats = false

[client]
toolbarMode = "minimal"
showErrorDetails = true
